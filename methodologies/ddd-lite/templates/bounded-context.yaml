# Bounded Context Template
# /ddd context new <name> 으로 생성됩니다.

context_id: ""              # BC-YYYYMMDD-NNN
name: ""                    # PascalCase (e.g., OrderManagement)
description: ""
owner: ""                   # 팀 또는 담당자
state: "draft"              # draft | active | deprecated

# 이 컨텍스트가 외부에 공개하는 인터페이스 (다른 BC는 이것만 호출 가능)
public_api:
  - type: ""                # command | query | event
    name: ""
    description: ""

# 이 컨텍스트가 의존하는 다른 컨텍스트
upstream_contexts: []       # [context_id, ...]

# 이 컨텍스트를 소비하는 다른 컨텍스트
downstream_contexts: []     # [context_id, ...]

# 컨텍스트 내부 경로 패턴 (check-context-boundary.sh 가 이 범위를 기준으로 검사)
paths:
  - ""                      # e.g., src/order-management/**

# 컨텍스트 간 통합 패턴
integration:
  pattern: ""               # shared-kernel | customer-supplier | conformist | anticorruption-layer | open-host | published-language
  notes: ""

created_at: ""
updated_at: ""
