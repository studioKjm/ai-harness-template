# Mikado Graph — Goal + Prerequisite Tree
# Created by: /mikado new <goal>
# DO NOT edit state directly — use /mikado commands

graph_id: "<graph-id>"             # e.g. mik-20260430-001
goal: ""                           # the refactoring goal (e.g. "replace DB driver")
created_at: ""
updated_at: ""

# Overall graph state (derived from nodes):
#   in-progress: root node not done
#   done:        root node done
#   abandoned:   explicitly abandoned
graph_state: "in-progress"

# Root node (the goal itself)
# Node states:
#   pending   → attempted  (when: /mikado try <node-id>)
#   attempted → blocked    (when: /mikado block <node-id> — prerequisites discovered)
#   attempted → done       (when: /mikado done <node-id> — no blockers, change committed)
#   blocked   → attempted  (when: all prerequisites done → /mikado try <node-id> again)
#   any       → reverted   (when: /mikado revert <node-id> — change reverted to main)
#
# Invariant: a node can only be 'done' if all its prerequisites are 'done'
nodes:
  - id: "root"
    label: ""                      # same as goal for root node
    state: "pending"
    prerequisites: []              # IDs of nodes that must be done before this
    parent_id: null                # null for root
    notes:
      hypothesis: ""               # why we believe this is achievable
      attempt_notes: ""            # what happened when we tried
      blocker_description: ""      # what prerequisites were discovered
      done_commit: ""              # SHA when this node was completed
    created_at: ""
    updated_at: ""

# Additional nodes are appended here when discovered via /mikado block
# Example:
#  - id: "node-001"
#    label: "extract DatabaseInterface"
#    state: "pending"
#    prerequisites: []
#    parent_id: "root"
#    notes: {...}

# Visualization (auto-generated by /mikado tree)
#
# Example output:
#   🎯 root [pending] "replace DB driver"
#   ├── 🔴 node-001 [blocked] "extract DatabaseInterface"
#   │   ├── ✅ node-003 [done] "add interface for UserRepository"
#   │   └── 🟡 node-004 [attempted] "add interface for OrderRepository"
#   └── 🟡 node-002 [attempted] "update connection pool config"

metadata:
  total_nodes: 1
  done_nodes: 0
  blocked_nodes: 0
  pending_nodes: 1
