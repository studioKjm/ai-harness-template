# BDD Feature Template
# /bdd-feature new <name> 으로 생성됩니다.

feature_id: ""              # FTR-YYYYMMDD-NNN
name: ""                    # 기능 이름 (사용자 언어)
description: ""             # "In order to... As a... I want to..."
state: "draft"              # draft | in-progress | done | deprecated

# 이 기능이 속한 도메인 컨텍스트
context_id: ""              # ddd-lite bounded context (선택)

# 포함된 시나리오 목록
scenarios: []               # [scenario_id, ...]

# 인수 조건 (시나리오로 커버되어야 할 항목)
acceptance_criteria:
  - id: "AC-1"
    description: ""
    covered_by: []          # [scenario_id, ...]

# 이 기능의 이해관계자
stakeholders:
  - role: ""                # e.g., "고객", "운영팀"
    need: ""                # 이 기능이 충족하는 필요

links:
  seed_id: ""               # ouroboros seed spec
  epic_id: ""

created_at: ""
updated_at: ""
